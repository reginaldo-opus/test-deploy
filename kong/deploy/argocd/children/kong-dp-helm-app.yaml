apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-dp-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.konghq.com
    chart: kong
    targetRevision: 2.36.0
    helm:
      values: |
        env:
          role: data_plane
          database: "off"
          cluster_control_plane: kong-cp-kong-cluster.kong.svc.cluster.local:8005
          cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
          cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key
          lua_ssl_trusted_certificate: /etc/secrets/kong-cluster-cert/tls.crt
        # ...existing code...
        # ...existing code...
        proxy:
          enabled: true
          http:
            enabled: true
            containerPort: 8000
          type: NodePort
          nodePort: 30080
        admin:
          enabled: false
        ingressController:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
