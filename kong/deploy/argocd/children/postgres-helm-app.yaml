apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-postgres-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 13.2.25
    helm:
      values: |
        auth:
          username: kong
          password: kong
          database: kong
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncWave: 0
