# ===========================================================================
# Secret for Kong Admin API credentials used by decK.
# In production, use Sealed Secrets, External Secrets Operator, or Vault.
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: kong-admin-credentials
  namespace: kong
  labels:
    app.kubernetes.io/name: kong-deck
    app.kubernetes.io/part-of: oob-kong
type: Opaque
stringData:
  DECK_KONG_ADDR: "http://kong-cp-kong-admin.kong.svc.cluster.local:8001"
  # Optional — uncomment and set if your Kong Admin API requires auth:
  # DECK_HEADERS: "kong-admin-token:your-token-here"
