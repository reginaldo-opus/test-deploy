apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kong

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secret.yaml
  - configmap.yaml
  - job.yaml

commonLabels:
  app.kubernetes.io/managed-by: argocd

# Generate a unique ConfigMap name based on content hash.
# This triggers ArgoCD to detect changes and re-run the Job.
configMapGenerator:
  - name: kong-deck-config
    behavior: replace
    files:
      - kong.yml=../../output/kong.yml
