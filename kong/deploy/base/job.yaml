# ===========================================================================
# Kubernetes Job that runs `deck sync` to apply the Kong declarative config.
#
# ArgoCD detects changes to the ConfigMap (kong.yml) and triggers a new sync,
# which recreates this Job.
#
# The Job uses a unique name suffix derived from the ConfigMap hash to ensure
# ArgoCD creates a new Job on every config change.
# ===========================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: deck-sync
  namespace: kong
  labels:
    app.kubernetes.io/name: kong-deck
    app.kubernetes.io/part-of: oob-kong
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong-deck
    spec:
      serviceAccountName: deck-sync-sa
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: deck
          image: kong/deck:v1.56.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== decK validate ==="
              deck file validate /config/kong.yml
              echo "=== decK sync (diff & apply) ==="
              deck gateway sync /config/kong.yml
              echo "=== Sync completed successfully ==="
          envFrom:
            - secretRef:
                name: kong-admin-credentials
          volumeMounts:
            - name: kong-config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: kong-config
          configMap:
            name: kong-deck-config
        - name: tmp
          emptyDir: {}
