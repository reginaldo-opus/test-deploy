apiVersion: batch/v1
kind: Job
metadata:
  name: deck-sync
  namespace: kong
  labels:
    app.kubernetes.io/name: kong-deck
    app.kubernetes.io/part-of: oob-kong
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kong-deck
    spec:
      serviceAccountName: deck-sync-sa
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: deck
          image: kong/deck:v1.56.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== decK validate ==="
