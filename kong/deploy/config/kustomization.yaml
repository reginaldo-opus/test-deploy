apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kong
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secret.yaml
  - configmap.yaml
  - job.yaml
configMapGenerator:
  - name: kong-deck-config
    behavior: replace
    files:
      - kong.yml=../../output/kong.yml
