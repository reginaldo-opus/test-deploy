# ===========================================================================
# values-argocd.yaml — ArgoCD Helm Values
#
# Chart: argo/argo-cd (Argo CD)
# Otimizado para Kind com recursos limitados.
#
# Ajustes principais:
#   - forceConflicts: evita conflito de SSA field ownership
#   - reposerver cache: reduz carga gRPC ao processar manifests grandes
#   - Probes relaxadas: evita CrashLoopBackOff em clusters com poucos recursos
#   - Insecure mode: HTTP puro (sem TLS) — adequado para dev/Kind
# ===========================================================================

global:
  # Server-Side Apply — resolve conflitos de ownership em updates
  serverSideApply:
    forceConflicts: true

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

  # Modo insecure (HTTP) — em produção, usar TLS com Ingress
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

configs:
  params:
    server.insecure: "true"
    # Cache de manifests no repo-server (reduz carga gRPC para configs grandes)
    reposerver.default.cache.expiration: 24h
  cm:
    # Intervalo de reconciliação: 3 minutos (default: 3m, pode aumentar em prod)
    timeout.reconciliation: 180s
    # Dagger refresh rate — otimiza detecção de mudanças
    resource.customizations.health.argoproj.io_Application: |
      hs = {}
      hs.status = "Healthy"
      hs.message = ""
      if obj.status ~= nil then
        if obj.status.health ~= nil then
          hs.status = obj.status.health.status
          if obj.status.health.message ~= nil then
            hs.message = obj.status.health.message
          end
        end
      end
      return hs

# Redis HA desabilitado — desnecessário para dev/Kind
redis-ha:
  enabled: false

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # ---------------------------------------------------------------------------
  # Probes — fix para "context canceled" no health check (chart 9.4.16+)
  #
  # Causa raiz: healthz?full=true compete com GenerateManifest em clusters
  # com poucos recursos. O kong.yaml.gz de ~18KB gera um ConfigMap que o
  # Kustomize processa em ~6s, bloqueando o health check.
  #
  # Solução: timeouts e intervals generosos para Kind/minikube.
  # Em produção com mais CPU, pode reduzir para valores menores.
  # ---------------------------------------------------------------------------
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 5
    successThreshold: 1

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 5
    successThreshold: 1
