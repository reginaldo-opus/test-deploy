global:
  serverSideApply:
    forceConflicts: true

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443
  
  extraArgs:
    - --insecure

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

configs:
  params:
    server.insecure: "true"
    # Cache de manifests no repo-server (reduz carga gRPC)
    reposerver.default.cache.expiration: 24h
  cm:
    timeout.reconciliation: 180s

redis-ha:
  enabled: false

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # ---------------------------------------------------------------------------
  # Probes — fix definitivo para "context canceled" no health check (chart 9.4.16)
  #
  # Causa raiz: O healthz?full=true compete com GenerateManifest em clusters
  # com poucos recursos (Kind). O kong.yaml de 849K faz o kustomize demorar
  # ~6s, bloqueando o health check por mais tempo que o timeout.
  # ---------------------------------------------------------------------------
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 5
    successThreshold: 1

  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 5
    successThreshold: 1
