kong-dp:
  image:
    repository: "{{ .Values.global.image.repository }}"
    tag: "{{ .Values.global.image.tag }}"

  env:
    role: data_plane
    database: "off"
    cluster_control_plane: kong-cp-kong-cluster.kong.svc.cluster.local:8005

  proxy:
    enabled: true
    http:
      enabled: true
      containerPort: 8000
    type: NodePort
    nodePort: "{{ .Values.global.nodePorts.proxy }}"

  admin:
    enabled: false

  ingressController:
    enabled: false
