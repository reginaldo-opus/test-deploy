## ArgoCD Helm Values

server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

  extraArgs:
    - --insecure

configs:
  params:
    server.insecure: true

  cm:
    timeout.reconciliation: 180s

redis-ha:
  enabled: false

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

server:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
