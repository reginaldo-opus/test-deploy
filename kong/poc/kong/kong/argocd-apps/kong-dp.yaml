apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-dp
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kong-stack
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.konghq.com
    chart: kong
    targetRevision: "*"
    helm:
      releaseName: kong-dp
      values: |
        image:
          repository: 618430153747.dkr.ecr.us-east-1.amazonaws.com/opus-open-banking-release/oob-kong
          tag: "2.35.0.17618d5-kong-3.10"
        env:
          role: data_plane
          database: "off"
          cluster_control_plane: kong-cp-kong-cluster.kong.svc.cluster.local:8005
          cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
          cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key
          lua_ssl_trusted_certificate: /etc/secrets/kong-cluster-cert/tls.crt
        secretVolumes:
          - kong-cluster-cert
        proxy:
          enabled: true
          http:
            enabled: true
            containerPort: 8000
          type: NodePort
          nodePort: 30080
        admin:
          enabled: false
        ingressController:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m0s
