apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-kong
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: kong-stack
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "*"
    helm:
      releaseName: postgres-kong
      values: |
        image:
          registry: registry-1.docker.io
          repository: bitnami/postgresql
          tag: "latest"
        auth:
          username: kong
          password: kong
          database: kong
        primary:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m0s
