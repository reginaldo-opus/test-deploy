# ===========================================================================
# postgres.yaml — ArgoCD Application para PostgreSQL
#
# Bitnami PostgreSQL chart — banco de dados do Kong Control Plane.
# sync-wave: 0 (primeiro a subir — dependência do Kong CP)
#
# NOTA: syncPolicy.automated está AUSENTE de propósito.
# O kong-stack (root app) controla o sync via sync-waves.
# Se tivéssemos automated aqui, a app sincronizaria imediatamente
# ao ser criada, ignorando a ordem das waves.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: postgresql
      targetRevision: 18.5.7
      helm:
        valueFiles:
          - $values/kong/poc/kong/kong-gitops/environments/hml/postgres-values.yaml

    - repoURL: https://github.com/reginaldo-opus/test-deploy.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  # Sem syncPolicy.automated — o root app (kong-stack) controla a ordem.
  # selfHeal e prune são herdados do sync do root.
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
