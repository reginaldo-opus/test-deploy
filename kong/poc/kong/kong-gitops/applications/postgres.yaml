apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  sources:
    # Source 1: Chart OCI
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: postgresql
      targetRevision: 18.5.7
      helm:
        valueFiles:
          - $values/environments/hml/postgres-values.yaml

    # Source 2: seu Git com values
    - repoURL: https://github.com/reginaldo-opus/test-deploy.git
      targetRevision: main
      ref: values
      path: kong/poc/kong/kong-gitops

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
