# ===========================================================================
# kong-dp.yaml — ArgoCD Application para Kong Data Plane
#
# Helm chart kong/kong 2.38.0 com multi-source.
# sync-wave: 2 (após CP estar Healthy, antes do deck sync)
#
# O DP é responsável por:
#   - Proxy de requests (:8000/:8443)
#   - Executar plugins (Go plugin servers)
#   - Zero downtime — recebe config do CP via websocket automaticamente
#
# NOTA: Sem syncPolicy.automated — root app controla a ordem via waves.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-dp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  sources:
    - repoURL: https://charts.konghq.com
      chart: kong
      targetRevision: 2.38.0
      helm:
        valueFiles:
          - $values/kong/poc/kong/kong-gitops/environments/hml/kong-dp-values.yaml

    - repoURL: https://github.com/reginaldo-opus/test-deploy.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
