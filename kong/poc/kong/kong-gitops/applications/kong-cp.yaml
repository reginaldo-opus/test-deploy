# ===========================================================================
# kong-cp.yaml — ArgoCD Application para Kong Control Plane
#
# Helm chart kong/kong 2.38.0 com multi-source (chart + values do Git).
# sync-wave: 1 (após PostgreSQL estar Healthy, antes do DP e deck)
#
# O CP é responsável por:
#   - Admin API (:8001) — onde o decK aplica a configuração
#   - Cluster listener (:8005) — distribui config para Data Planes
#   - Armazenar configuração no PostgreSQL
#
# NOTA: Sem syncPolicy.automated — root app controla a ordem via waves.
# ===========================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-cp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  sources:
    - repoURL: https://charts.konghq.com
      chart: kong
      targetRevision: 2.38.0
      helm:
        valueFiles:
          - $values/kong/poc/kong/kong-gitops/environments/hml/kong-cp-values.yaml

    - repoURL: https://github.com/reginaldo-opus/test-deploy.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
