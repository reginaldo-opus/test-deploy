apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-cp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  sources:
    - repoURL: https://charts.konghq.com
      chart: kong
      targetRevision: 2.38.0
      helm:
        valueFiles:
          # CAMINHO COMPLETO A PARTIR DA RAIZ DO GIT
          - $values/kong/poc/kong/kong-gitops/environments/hml/kong-cp-values.yaml

    - repoURL: https://github.com/reginaldo-opus/test-deploy.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
