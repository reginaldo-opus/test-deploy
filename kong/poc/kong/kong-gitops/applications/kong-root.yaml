apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/reginaldo-opus/test-deploy.git
    targetRevision: main
    path: kong/poc/kong/kong-gitops/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      prune: true
      selfHeal: true