apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/reginaldo-opus/test-deploy.git
    targetRevision: master
    path: kong/poc/kong/kong-gitops/plataform/kong
    helm:
      valueFiles:
        - values.yaml
        - values/postgres.yaml
        - values/kong-cp.yaml
        - values/kong-dp.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kong

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
