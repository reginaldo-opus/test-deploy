# ==========================================================
# GLOBAL VALUES - HML
#
# Variáveis compartilhadas entre todos os componentes.
# Referenciadas nos values individuais via {{ .Values.global.* }}
#
# NOTA: O nome do service PostgreSQL depende do Helm release name.
#   ArgoCD release "postgres" → service "postgres-postgresql"
#   Manual release "postgres-kong" → service "postgres-kong-postgresql"
# ==========================================================

global:

  # --------------------------------------------------------
  # Namespace padrão
  # --------------------------------------------------------
  namespace: kong

  # --------------------------------------------------------
  # Docker Images
  # --------------------------------------------------------
  imageRegistry: 618430153747.dkr.ecr.sa-east-1.amazonaws.com

  kong:
    repository: opus-open-banking-release/oob-kong
    tag: "2.35.0.17618d5-kong-3.10"

  postgres:
    repository: bitnami/postgresql
    # Fixar versão — "latest" pode quebrar entre deploys
    tag: "16.6.0"

  # --------------------------------------------------------
  # Database
  # O host depende do Helm release name do PostgreSQL.
  # ArgoCD: release "postgres" → "postgres-postgresql.kong.svc"
  # --------------------------------------------------------
  database:
    host: postgres-postgresql.kong.svc.cluster.local
    port: 5432
    name: kong
    user: kong
    password: kong
