apiVersion: batch/v1
kind: Job
metadata:
  name: kong-deck-sync
  namespace: kong
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
        - name: deck
          image: kong/deck:v1.56.0
          command:
            - deck
          args:
            - gateway
            - sync
            - /config/kong.yaml
            - --kong-addr
            - http://kong-cp-kong-admin.kong.svc.cluster.local:8001
          volumeMounts:
            - name: kong-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: kong-config
          configMap:
            name: kong-deck-state
      restartPolicy: Never
  backoffLimit: 2
