apiVersion: batch/v1
kind: Job
metadata:
  name: kong-deck-sync
  namespace: kong
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      # -----------------------------------------------------------------------
      # 1. initContainer descomprime kong.yaml.gz → kong.yaml em volume compartilhado
      # -----------------------------------------------------------------------
      initContainers:
        - name: decompress
          image: busybox:1.36
          command: [sh, -c]
          args:
            - |
              echo "Descomprimindo kong.yaml.gz..."
              gunzip -c /compressed/kong.yaml.gz > /config/kong.yaml
              ls -lh /config/kong.yaml
              echo "OK — $(wc -c < /config/kong.yaml) bytes"
          volumeMounts:
            - name: compressed
              mountPath: /compressed
              readOnly: true
            - name: config
              mountPath: /config

      # -----------------------------------------------------------------------
      # 2. Container principal executa deck gateway sync com o YAML descomprimido
      # -----------------------------------------------------------------------
      containers:
        - name: deck
          image: kong/deck:v1.56.0
          command: [deck]
          args:
            - gateway
            - sync
            - /config/kong.yaml
            - --kong-addr
            # Nome curto do service — fix musl libc DNS no Alpine
            - http://kong-cp-kong-admin:8001
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true

      volumes:
        # Volume com o ConfigMap (binaryData do .gz)
        - name: compressed
          configMap:
            name: kong-deck-state
        # Volume temporário para o YAML descomprimido
        - name: config
          emptyDir: {}

      restartPolicy: Never
  backoffLimit: 2
