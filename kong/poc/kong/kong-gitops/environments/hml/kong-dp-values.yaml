# ===========================================================================
# kong-dp-values.yaml — Kong Data Plane (GitOps via ArgoCD)
#
# Valores Helm para o Kong DP (proxy de requests).
# O DP recebe configuração do CP via cluster protocol (wss://).
#
# SEGURANÇA: Certificados TLS referenciados via Kubernetes Secret.
# A Secret "kong-cluster-cert" é criada pelo kong-cp-values.yaml
# (extraObjects com helm.sh/hook: pre-install,pre-upgrade).
#
# NUNCA coloque chaves privadas diretamente neste arquivo!
# ===========================================================================

image:
  repository: 618430153747.dkr.ecr.sa-east-1.amazonaws.com/opus-open-banking-release/oob-kong
  tag: "2.35.0.17618d5-kong-3.10"

env:
  role: data_plane
  database: "off"
  # Endereço do CP para receber configuração via websocket
  cluster_control_plane: kong-cp-kong-cluster.kong.svc.cluster.local:8005
  # Certificados montados via secretVolumes (Kubernetes Secret)
  cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
  cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key
  lua_ssl_trusted_certificate: /etc/secrets/kong-cluster-cert/tls.crt

# Monta a Secret "kong-cluster-cert" como volume em /etc/secrets/
secretVolumes:
  - kong-cluster-cert

proxy:
  enabled: true
  http:
    enabled: true
    containerPort: 8000
  type: NodePort
  nodePort: 30080

admin:
  enabled: false

ingressController:
  enabled: false

# ---------------------------------------------------------------------------
# Probes — Kong com plugins Go demora ~40s para inicializar no Kind.
# Defaults do chart (initialDelaySeconds: 5) matam o pod antes de ficar ready.
# ---------------------------------------------------------------------------
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 5
