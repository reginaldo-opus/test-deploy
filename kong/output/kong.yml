    "protocols":
    - "grpc"
    - "grpcs"
    - "http"
    - "https"
  "port": 8080
  "protocol": "http"
  "routes":
  - "hosts":
    - "api.opus.com.br"
    "methods":
    - "GET"
    - "OPTIONS"
    "name": "brand1.oob-status_GET-metrics-v2"
    "paths":
    - "~/open-banking/admin/v2/metrics$"
    "plugins":
    - "config":
        "add":
          "headers":
          - "X-Brand-ID:brand1"
        "remove":
          "headers":
          - "X-Brand-ID"
          - "Content-Type"
      "name": "request-transformer"
      "protocols":
      - "grpc"
      - "grpcs"
      - "http"
      - "https"
    - "config":
        "add":
          "headers":
          - "x-v:2.0.1"
        "remove":
          "headers":
          - "X-OOB-Connector-Measurements"
      "name": "response-transformer"
      "protocols":
      - "grpc"
      - "grpcs"
      - "http"
      - "https"
    - "config":
        "blockbeforedate": "2023-11-17"
        "blockfromdate": "none"
      "name": "oob-route-block"
      "protocols":
      - "grpc"
      - "grpcs"
      - "http"
      - "https"
    "protocols":
    - "http"
    - "https"
    "strip_path": false
