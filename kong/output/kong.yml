"_format_version": "3.0"
"_transform": true
"plugins":
- "config":
    "latency_metrics": true
    "per_consumer": true
    "status_code_metrics": true
  "name": "prometheus"
  "protocols":
  - "grpc"
  - "grpcs"
  - "http"
  - "https"
- "config":
    "access":
    - "kong.log.set_serialize_value(\"request.body\", kong.request.get_raw_body())"
    "body_filter":
    - "kong.log.set_serialize_value(\"response.body\", kong.response.get_raw_body())"
  "name": "pre-function"
  "protocols":
  - "grpc"
  - "grpcs"
  - "http"
  - "https"
- "config":
    "error_code": 529
    "hide_client_headers": true
    "limit_by": "path"
    "path": "/"
    "policy": "local"
    "second": 300
  "name": "rate-limiting"
  "protocols":
  - "grpc"
  - "grpcs"
  - "http"
  - "https"
- "config": {}
  "name": "oob-kong-custom-metrics"
  "protocols":
  - "grpc"
  - "grpcs"
  - "http"
  - "https"
- "config":
    "batch_flush_delay": 3
    "batch_span_count": 500
    "endpoint": "http://otel-collector:4318/v1/traces"
  "name": "opentelemetry"
  "protocols":
  - "grpc"
  - "grpcs"
  - "http"
  - "https"
"services":
- "host": "oob-status"
  "name": "brand1.oob-status"
  "plugins":
  - "config":
      "methods":
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
      "origins":
      - "*"
    "name": "cors"
    "protocols":
    - "grpc"
    - "grpcs"
    - "http"
    - "https"
  - "config":
      "hide_client_headers": true
      "limit_by": "ip"
      "minute": 120
      "policy": "local"
    "name": "rate-limiting"
    "protocols":
    - "grpc"
    - "grpcs"
    - "http"
    - "https"
  - "config":
