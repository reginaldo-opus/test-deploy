    "name": "oob-fapi-interaction-id"
    "protocols":
    - "grpc"
    - "grpcs"
    - "http"
    - "https"
  - "config":
      "sslcertificateheadername": "X-SSL-Client-Cert"
    "name": "oob-kong-consumer-handler"
    "protocols":
    - "grpc"
    - "grpcs"
    - "http"
    - "https"
  - "config": {}
